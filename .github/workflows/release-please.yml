name: Release Please

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

  publish:
    runs-on: ubuntu-24.04
    needs: release-please
    if: needs.release-please.outputs.release_created
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build native
        run: |
          chmod +x scripts/build-linux-x64.sh
          scripts/build-linux-x64.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release
        
      - name: Pack
        run: dotnet pack -c Release -o packages --include-symbols -p:SymbolPackageFormat=snupkg -p:Version=${{ needs.release-please.outputs.version }}

      - name: Push to NuGet
        run: |
          for f in packages/*.nupkg; do
            dotnet nuget push "$f" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          done