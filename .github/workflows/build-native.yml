name: Build Native

on:
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build-native:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            script: scripts/build-native.sh
          - os: macos-latest
            script: scripts/build-native.sh
          - os: windows-latest
            script: scripts/build-native.bat

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native (Windows)
        if: matrix.os == 'windows-latest'
        run: scripts/build-native.bat

      - name: Build native (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x ${{ matrix.script }}
          ${{ matrix.script }}

      - name: Commit native libs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Luau.Native/runtimes/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update native libs [${{ matrix.os }}]"
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break || sleep $((i * 5))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}